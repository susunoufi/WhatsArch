        function renderProgressSection(cardId, sectionKey, label, icon, done, total, files) {
            if (total === 0) {
                return `<div class="progress-row" style="cursor:default;">
                    <span class="progress-row-icon" style="color:var(--text-muted);"><i class="fas ${icon}"></i></span>
                    <span class="progress-row-label">${label}</span>
                    <span style="font-size:0.83em;color:var(--text-muted);">אין קבצים</span>
                </div>`;
            }

            const pct = Math.round(done / total * 100);
            const color = pct === 100 ? 'var(--accent-green)' : (pct > 0 ? 'var(--accent-amber)' : 'var(--text-muted)');
            const detailId = cardId + '-detail-' + sectionKey;

            let fileListHtml = '';
            if (files && files.length > 0) {
                fileListHtml = files.map(f => {
                    const isDone = f.done || f.described || false;
                    return `<div class="file-detail-item">
                        <span class="file-status ${isDone ? 'done' : 'pending'}"><i class="fas ${isDone ? 'fa-check' : 'fa-minus'}"></i></span>
                        <span class="file-name">${escapeHtml(f.name)}</span>
                    </div>`;
                }).join('');
            }

            return `
                <div class="progress-row" onclick="toggleFileDetail('${detailId}', this)">
                    <span class="progress-row-icon" style="color:${color};"><i class="fas ${icon}"></i></span>
                    <span class="progress-row-label">${label}</span>
                    <div class="progress-bar-container"><div class="progress-bar-fill" style="width:${pct}%;background:${color};"></div></div>
                    <span class="progress-row-count">${done}/${total}</span>
                    <span class="progress-row-pct" style="color:${color};">${pct}%</span>
                    ${files && files.length > 0 ? `<span class="progress-row-expand"><i class="fas fa-chevron-left"></i></span>` : '<span style="width:20px;"></span>'}
                </div>
                ${files && files.length > 0 ? `<div class="file-detail-list" id="${detailId}">${fileListHtml}</div>` : ''}
            `;
        }

        function renderIndexRow(index) {
            const color = index.exists ? 'var(--accent-green)' : 'var(--text-muted)';
            return `<div class="progress-row" style="cursor:default;">
                <span class="progress-row-icon" style="color:${color};"><i class="fas fa-database"></i></span>
                <span class="progress-row-label">מנוע חיפוש</span>
                <span style="font-size:0.85em;color:${color};">${index.exists ? `<i class="fas fa-check-circle"></i> ${index.message_count.toLocaleString('he-IL')} הודעות` : '<i class="fas fa-times-circle"></i> לא נבנה'}</span>
            </div>`;
        }

        function renderEmbeddingsRow(embeddings) {
            const color = embeddings.exists ? 'var(--accent-green)' : 'var(--text-muted)';
            return `<div class="progress-row" style="cursor:default;">
                <span class="progress-row-icon" style="color:${color};"><i class="fas fa-brain"></i></span>
                <span class="progress-row-label">חיפוש חכם (AI)</span>
                <span style="font-size:0.85em;color:${color};">${embeddings.exists ? '<i class="fas fa-check-circle"></i> קיים' : '<i class="fas fa-times-circle"></i> לא נבנה'}</span>
            </div>`;
        }

        function renderActionBtn(chatName, task, label, icon, runningTask) {
            const isThisRunning = runningTask === task;
            const isAnyRunning = !!runningTask;
            const disabled = isAnyRunning && !isThisRunning ? 'disabled' : '';
            const cls = isThisRunning ? 'btn-action running' : 'btn-action';
            const iconHtml = isThisRunning ? '<i class="fas fa-spinner fa-spin"></i>' : `<i class="fas ${icon}"></i>`;
            let html = `<button class="${cls}" ${disabled} onclick="startProcessing('${escapeHtml(chatName)}', '${task}')" data-task="${task}">${iconHtml} ${label}</button>`;
            if (isThisRunning) {
                html += `<button class="btn-stop" onclick="stopProcessing('${escapeHtml(chatName)}')" data-role="stop"><i class="fas fa-stop"></i> עצור</button>`;
            }
            return html;
        }

        function toggleFileDetail(id, rowEl) {
            const list = document.getElementById(id);
            if (!list) return;
            const isOpen = list.classList.contains('open');
            list.classList.toggle('open');
            const expandIcon = rowEl.querySelector('.progress-row-expand');
            if (expandIcon) expandIcon.classList.toggle('open');
        }

        async function startProcessing(chatName, task) {
            try {
                const res = await fetch('/api/process/start', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({chat: chatName, task: task})
                });
                const data = await res.json();
                if (data.error) { alert(data.error); return; }

                // Update UI immediately
                const cardId = 'mgmt-' + chatName.replace(/[^a-zA-Z0-9\u0590-\u05FF]/g, '_');
                const actions = document.getElementById(cardId + '-actions');
                if (actions) {
                    actions.querySelectorAll('.btn-action').forEach(btn => {
                        if (btn.dataset.task === task) {
                            btn.classList.add('running');
                            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> מעבד...';
                        } else {
                            btn.disabled = true;
                        }
                    });
                    // Add stop button
                    const stopBtn = document.createElement('button');
                    stopBtn.className = 'btn-stop';
                    stopBtn.setAttribute('data-role', 'stop');
                    stopBtn.onclick = () => stopProcessing(chatName);
                    stopBtn.innerHTML = '<i class="fas fa-stop"></i> עצור';
                    actions.appendChild(stopBtn);
                }

                startProgressPolling(chatName);
            } catch (err) {
                alert('שגיאה בהפעלת המשימה');
            }
        }

        async function stopProcessing(chatName) {
            try {
                const res = await fetch('/api/process/stop', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({chat: chatName})
                });
                const data = await res.json();
                if (data.error) { alert(data.error); return; }

                // Update stop button to show "stopping" state
                const cardId = 'mgmt-' + chatName.replace(/[^a-zA-Z0-9\u0590-\u05FF]/g, '_');
                const actions = document.getElementById(cardId + '-actions');
                if (actions) {
                    const stopBtn = actions.querySelector('.btn-stop');
                    if (stopBtn) {
                        stopBtn.disabled = true;
                        stopBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> עוצר...';
                    }
                }
            } catch (err) {
                alert('שגיאה בעצירת המשימה');
            }
        }

        function startProgressPolling(chatName) {
            if (progressPollers[chatName]) return;
            progressPollers[chatName] = setInterval(async () => {
                try {
                    const res = await fetch('/api/process/progress?chat=' + encodeURIComponent(chatName));
                    const data = await res.json();

                    if (data.status === 'running') {
                        updateRunningButton(chatName, data);
                    } else {
                        // Task finished (idle, cancelled, or error)
                        stopProgressPolling(chatName);
                        if (data.status === 'error' && data.error) {
                            alert('שגיאה: ' + data.error);
                        } else if (data.status === 'cancelled') {
                            // Silently handle cancellation - UI refreshes below
                        }
                        // Refresh management data
                        loadManagementData();
                        // Also refresh stats in case index was rebuilt
                        if (currentChat) loadStats();
                    }
                } catch (err) {
                    stopProgressPolling(chatName);
                }
            }, 2000);
        }

        function stopProgressPolling(chatName) {
            if (progressPollers[chatName]) {
                clearInterval(progressPollers[chatName]);
                delete progressPollers[chatName];
            }
        }

        function updateRunningButton(chatName, taskInfo) {
            const cardId = 'mgmt-' + chatName.replace(/[^a-zA-Z0-9\u0590-\u05FF]/g, '_');
            const actions = document.getElementById(cardId + '-actions');
            if (!actions) return;
            const runningBtn = actions.querySelector('.btn-action.running');
            if (runningBtn && taskInfo.total > 0) {
                runningBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${taskInfo.processed}/${taskInfo.total}`;
            }
        }

        function checkAndPollProgress(chatName) {
            fetch('/api/process/progress?chat=' + encodeURIComponent(chatName))
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'running') startProgressPolling(chatName);
                })
                .catch(() => {});
        }

        // ============================================================
        // AI CHAT
        // ============================================================
        let aiChatOpen = false;
        let aiHistory = [];
        let aiIsLoading = false;

        async function initAiChat() {
            try {
                const res = await fetch('/api/ai/status');
                const data = await res.json();
                if (data.configured) {
                    document.getElementById('aiChatFab').style.display = 'flex';
                    document.getElementById('aiProviderBadge').textContent = data.model;
                }
            } catch (err) {}
        }

        function setupAiListeners() {
            document.getElementById('aiChatInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAiMessage(); }
            });
        }

        function toggleAiChat() {
            aiChatOpen = !aiChatOpen;
            const $panel = document.getElementById('aiChatPanel');
            const $fab = document.getElementById('aiChatFab');
            if (aiChatOpen) {
                $panel.classList.add('active');
                $fab.classList.add('active');
                $fab.innerHTML = '<i class="fas fa-times"></i>';
                document.getElementById('aiChatInput').focus();
            } else {
                $panel.classList.remove('active');
                $fab.classList.remove('active');
                $fab.innerHTML = '<i class="fas fa-robot"></i>';
            }
        }

        async function sendAiMessage() {
            if (aiIsLoading) return;
            const $input = document.getElementById('aiChatInput');
            const question = $input.value.trim();
            if (!question) return;
            if (!currentChat) { addAiMessage('assistant', 'אנא בחר שיחה קודם.'); return; }

            addAiMessage('user', question);
            $input.value = '';
            aiHistory.push({ role: 'user', content: question });

            aiIsLoading = true;
            document.getElementById('aiSendBtn').disabled = true;
            const typingEl = showTypingIndicator();

            try {
                const res = await fetch('/api/ai/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat: currentChat, question: question, history: aiHistory.slice(-4) })
                });
                const data = await res.json();
                typingEl.remove();

                if (data.error) { addAiMessage('assistant', data.error); }
                else { addAiMessage('assistant', data.answer, data.sources); aiHistory.push({ role: 'assistant', content: data.answer }); }

                if (aiHistory.length > 20) aiHistory = aiHistory.slice(-20);
            } catch (err) {
                typingEl.remove();
                addAiMessage('assistant', 'שגיאה בתקשורת עם השרת. נסו שוב.');
            }

            aiIsLoading = false;
            document.getElementById('aiSendBtn').disabled = false;
        }

        function addAiMessage(role, text, sources) {
            const $messages = document.getElementById('aiChatMessages');
            const div = document.createElement('div');
            div.className = 'ai-msg ' + role;
            let html = escapeHtml(text).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>').replace(/\[#(\d+)\]/g, '<span class="ai-source-link" onclick="showAiSource($1)">[#$1]</span>');
            div.innerHTML = html;

            if (sources && sources.length > 0) {
                const sourcesDiv = document.createElement('div');
                sourcesDiv.className = 'ai-sources';
                sourcesDiv.innerHTML = '<div style="margin-bottom:4px;">מקורות:</div>' +
                    sources.slice(0, 8).map(s => {
                        const time = formatDateTime(s.datetime);
                        return '<span class="ai-source-link" onclick="showAiSource(' + s.message_id + ')" title="' + escapeHtml(s.preview) + '">' + escapeHtml(s.sender) + ' - ' + time + '</span>';
                    }).join(' ');
                div.appendChild(sourcesDiv);
            }
            $messages.appendChild(div);
            $messages.scrollTop = $messages.scrollHeight;
        }

        function showTypingIndicator() {
            const $messages = document.getElementById('aiChatMessages');
            const div = document.createElement('div');
            div.className = 'ai-typing';
            div.innerHTML = '<span></span><span></span><span></span>';
            $messages.appendChild(div);
            $messages.scrollTop = $messages.scrollHeight;
            return div;
        }

        async function showAiSource(messageId) {
            const existingCard = document.querySelector('.message-card[data-id="' + messageId + '"]');
            if (existingCard) {
                existingCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                existingCard.style.boxShadow = '0 0 0 2px var(--accent-green)';
                setTimeout(() => existingCard.style.boxShadow = '', 3000);
                return;
            }

            try {
                const res = await fetch('/api/context/' + messageId + '?chat=' + encodeURIComponent(currentChat) + '&before=5&after=5');
                const data = await res.json();

                let html = '<div class="ai-context-inline"><div class="ctx-label"><i class="fas fa-stream"></i> הקשר ההודעה:</div>';
                data.messages.forEach(m => {
                    const cls = senderClass(m.sender);
                    const isFocus = m.id === data.focus_id;
                    const time = formatDateTime(m.datetime);
                    const text = escapeHtml(m.text || m.transcription || '(מדיה)');
                    html += '<div class="ai-context-msg' + (isFocus ? ' focused' : '') + '"><span class="ctx-sender ' + cls + '" style="font-size:0.82em;font-weight:600;">' + escapeHtml(m.sender) + '</span> <span style="font-size:0.72em;color:var(--text-muted);">' + time + '</span><div style="color:var(--text-secondary);">' + text + '</div></div>';
                });
                html += '</div>';

                const div = document.createElement('div');
                div.className = 'ai-msg assistant';
                div.innerHTML = html;
                document.getElementById('aiChatMessages').appendChild(div);
                document.getElementById('aiChatMessages').scrollTop = document.getElementById('aiChatMessages').scrollHeight;
            } catch (err) {}
        }
    </script>
</body>
</html>
